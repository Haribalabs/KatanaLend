<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KatanaLend — BladeForge Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #0f1419;
      --panel: #151b24;
      --border: #1e2836;
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --accent-glow: rgba(0, 212, 170, 0.15);
      --danger: #ff6b6b;
      --warn: #f0c14b;
      --text: #e6edf3;
      --text-dim: #7d8a99;
      --radius: 10px;
      --font: "Outfit", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        linear-gradient(180deg, rgba(0, 212, 170, 0.03) 0%, transparent 40%),
        radial-gradient(ellipse 100% 50% at 50% -20%, var(--accent-glow), transparent 50%);
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo span { color: var(--text-dim); font-weight: 500; }

    .wallet {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }

    .wallet .addr {
      color: var(--text);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .btn.primary:hover { filter: brightness(1.1); }

    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: var(--danger); color: var(--bg); }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .stat .label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
    }

    .stat .value {
      font-size: 1.1rem;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text);
    }

    .stat .value.accent { color: var(--accent); }
    .stat .value.danger { color: var(--danger); }
    .stat .value.warn { color: var(--warn); }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      font-family: var(--font);
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      font-family: var(--font-mono);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .input-row input { flex: 1; }
    .input-row .max {
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem;
    }
    .input-row .max:hover { text-decoration: underline; }

    .panel-section {
      display: none;
    }
    .panel-section.active { display: block; }

    .position-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .position-row:last-child { border-bottom: none; }

    .position-row .asset {
      font-family: var(--font-mono);
      color: var(--accent);
    }

    .position-row .amount { font-family: var(--font-mono); color: var(--text); }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .connect-prompt {
      text-align: center;
      padding: 3rem 2rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .connect-prompt p {
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }

    .contract-config {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 1rem;
    }

    .contract-config input {
      width: 100%;
      padding: 0.4rem 0.6rem;
      margin-top: 0.3rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
    }

    .health-bar {
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .health-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }

    .health-bar .fill.safe { background: var(--accent); }
    .health-bar .fill.warn { background: var(--warn); }
    .health-bar .fill.danger { background: var(--danger); }

    .tx-status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      display: none;
    }

    .tx-status.show { display: block; }
    .tx-status.success { background: rgba(0, 212, 170, 0.15); border: 1px solid var(--accent); color: var(--accent); }
    .tx-status.error { background: rgba(255, 107, 107, 0.15); border: 1px solid var(--danger); color: var(--danger); }
    .tx-status.pending { background: rgba(240, 193, 75, 0.15); border: 1px solid var(--warn); color: var(--warn); }

    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Katana<span>Lend</span></div>
      <div class="wallet" id="walletInfo">
        <span class="addr" id="userAddr">—</span>
        <button class="btn" id="connectBtn">Connect</button>
      </div>
    </header>

    <div id="connectPrompt" class="connect-prompt">
      <p>Connect your wallet to use the BladeForge Vault lending market.</p>
      <button class="btn primary" id="connectBtnMain">Connect Wallet</button>
      <div class="contract-config" style="margin-top: 1.5rem;">
        <label>Vault contract address (optional)</label>
        <input type="text" id="vaultAddress" placeholder="0x..." />
      </div>
    </div>

    <div id="appContent" style="display: none;">
      <div class="stats">
        <div class="stat">
          <div class="label">TVL (est)</div>
          <div class="value accent" id="statTvl">—</div>
        </div>
        <div class="stat">
          <div class="label">Your collateral</div>
          <div class="value" id="statCollateral">—</div>
        </div>
        <div class="stat">
          <div class="label">Your debt</div>
          <div class="value" id="statDebt">—</div>
        </div>
        <div class="stat">
          <div class="label">Health factor</div>
          <div class="value" id="statHealth">—</div>
          <div class="health-bar" id="healthBar"><div class="fill safe" id="healthFill" style="width: 100%"></div></div>
        </div>
      </div>

      <div class="card">
        <h2>Positions</h2>
        <div class="tabs">
          <button class="tab active" data-tab="supply">Supply / Withdraw</button>
          <button class="tab" data-tab="borrow">Borrow / Repay</button>
          <button class="tab" data-tab="overview">Overview</button>
        </div>

        <div id="panelSupply" class="panel-section active">
          <div class="form-group">
            <label>Asset</label>
            <select id="supplyAsset"></select>
          </div>
          <div class="form-group">
            <label>Amount (supply)</label>
            <div class="input-row">
              <input type="text" id="supplyAmount" placeholder="0" />
              <span class="max" id="supplyMax">Max</span>
            </div>
          </div>
          <button class="btn primary" id="supplyBtn">Supply</button>
          <hr style="border: none; border-top: 1px solid var(--border); margin: 1rem 0;" />
          <div class="form-group">
            <label>Amount (withdraw)</label>
            <div class="input-row">
              <input type="text" id="withdrawAmount" placeholder="0" />
              <span class="max" id="withdrawMax">Max</span>
            </div>
          </div>
          <button class="btn" id="withdrawBtn">Withdraw</button>
        </div>

        <div id="panelBorrow" class="panel-section">
          <div class="form-group">
            <label>Asset</label>
            <select id="borrowAsset"></select>
          </div>
          <div class="form-group">
            <label>Amount (borrow)</label>
            <div class="input-row">
              <input type="text" id="borrowAmount" placeholder="0" />
              <span class="max" id="borrowMax">Max</span>
            </div>
          </div>
          <button class="btn primary" id="borrowBtn">Borrow</button>
          <hr style="border: none; border-top: 1px solid var(--border); margin: 1rem 0;" />
          <div class="form-group">
            <label>Amount (repay)</label>
            <div class="input-row">
              <input type="text" id="repayAmount" placeholder="0" />
              <span class="max" id="repayMax">Max</span>
            </div>
          </div>
          <button class="btn" id="repayBtn">Repay</button>
        </div>

        <div id="panelOverview" class="panel-section">
          <div id="positionList"></div>
          <div class="card" style="margin-top: 1rem;">
