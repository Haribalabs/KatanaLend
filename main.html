<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KatanaLend — BladeForge Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #0f1419;
      --panel: #151b24;
      --border: #1e2836;
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --accent-glow: rgba(0, 212, 170, 0.15);
      --danger: #ff6b6b;
      --warn: #f0c14b;
      --text: #e6edf3;
      --text-dim: #7d8a99;
      --radius: 10px;
      --font: "Outfit", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        linear-gradient(180deg, rgba(0, 212, 170, 0.03) 0%, transparent 40%),
        radial-gradient(ellipse 100% 50% at 50% -20%, var(--accent-glow), transparent 50%);
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo span { color: var(--text-dim); font-weight: 500; }

    .wallet {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }

    .wallet .addr {
      color: var(--text);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .btn.primary:hover { filter: brightness(1.1); }

    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: var(--danger); color: var(--bg); }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .stat .label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
    }

    .stat .value {
      font-size: 1.1rem;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text);
    }

    .stat .value.accent { color: var(--accent); }
    .stat .value.danger { color: var(--danger); }
    .stat .value.warn { color: var(--warn); }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-dim);
